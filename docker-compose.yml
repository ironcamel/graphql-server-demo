services:
  app:
    build: .
    #image: graphql-app:latest
    image: 551522033132.dkr.ecr.us-east-1.amazonaws.com/graphql-app:latest
    ports:
      - "8001:8000"
    environment:
      DATABASE: ${DATABASE}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_HOST: db
      NODE_PORT: ${NODE_PORT}
      SECRET: ${SECRET}
    depends_on:
      db:
        condition: service_healthy

  db:
    build: ./db
    #image: postgres:16-alpine
    image: 551522033132.dkr.ecr.us-east-1.amazonaws.com/graphql-db:latest
    environment:
      POSTGRES_DB: ${DATABASE}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
